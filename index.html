<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='style.css'>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>

</head>
<body>
    <!-- <model-viewer class="full-screen"
        alt="Bill Board" 
        src="models//bill_bord_01.glb" 
        shadow-intensity="1" 
        camera-controls 
        disable-tap 
        auto-rotate 
        ar >
    </model-viewer> -->

    <model-viewer 
        id="model-viewer"
        class="full-screen"
        src="models//bill_bord_01_new.glb"
        ar 
        ar-modes="webxr" 
        camera-controls
        tone-mapping="neutral" 
        shadow-intensity="1"
        camera-orbit="0deg 90deg 105%"
        min-camera-orbit="auto 0deg auto"
        max-camera-orbit="auto 90deg auto"
        disable-tap >

        <div class="progress-bar hide" slot="progress-bar">
            <div class="update-bar"></div>
        </div>
        <!-- <button slot="ar-button" id="ar-button">
            View in your space
        </button> -->
        <!-- <div id="ar-prompt">
            <img src="https://modelviewer.dev/shared-assets/icons/hand.png">
        </div> -->
        <button slot="ar-button" class="ar-button">
            <p> Activate AR</p>
        </button>
    </model-viewer>

    <input type="file" id="textureSelector" hidden>
    <div class="button-container">
        <button type="button" id="uploadButton">Upload Image</button>
        <button type="button" id="arButton">Activate AR</button>
    </div>
    
    <script src='main.js'></script>
</body>
</html>
